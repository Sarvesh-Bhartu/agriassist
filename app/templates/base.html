<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Agricultural Assistant Platform{% endblock %}</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/custom.css">
    
    {% block extra_css %}{% endblock %}
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-green-700 text-white shadow-lg">
        <div class="container mx-auto px-4">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-xl font-bold">🌾 AgriAssist</a>
                    
                    <div id="nav-links" class="hidden md:flex space-x-4">
                        <a href="/dashboard" class="hover:bg-green-600 px-3 py-2 rounded">Dashboard</a>
                        <a href="/plants/scanner" class="hover:bg-green-600 px-3 py-2 rounded">Plant Scanner</a>
                        <a href="/farms/create" class="hover:bg-green-600 px-3 py-2 rounded">My Farms</a>
                        <a href="/recommendations" class="hover:bg-green-600 px-3 py-2 rounded">Recommendations</a>
                        <a href="/leaderboard" class="hover:bg-green-600 px-3 py-2 rounded">Leaderboard</a>
                    </div>
                </div>
                
                <div id="auth-section" class="flex items-center space-x-4">
                    <!-- Will be populated by JavaScript -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="min-h-screen">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white mt-12">
        <div class="container mx-auto px-4 py-8">
            <div class="text-center">
                <p>&copy; 2026 Agricultural Assistant Platform. Built for Indian Farmers.</p>
                <p class="text-sm text-gray-400 mt-2">Powered by Google Gemini AI</p>
            </div>
        </div>
    </footer>

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Main JavaScript -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/notifications.js"></script>
    
    {% block extra_js %}{% endblock %}
    
    <script>
        // Initialize authentication UI
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('token');
            const authSection = document.getElementById('auth-section');
            const navLinks = document.getElementById('nav-links');
            
            if (token) {
                // User is logged in
                fetch('/api/auth/me', {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                })
               .then(res => res.json())
                .then(user => {
                    authSection.innerHTML = `
                        <div class="flex items-center space-x-3">
                            <span class="font-medium">${user.name}</span>
                            <span class="bg-green-500 px-2 py-1 rounded text-sm">${user.total_points} pts</span>
                            <button onclick="logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded">Logout</button>
                        </div>
                    `;
                    navLinks.classList.remove('hidden');
                })
                .catch(() => {
                    // Token invalid, clear it
                    localStorage.removeItem('token');
                    showLoginButton();
                });
            } else {
                showLoginButton();
            }
        });
        
        function showLoginButton() {
            const authSection = document.getElementById('auth-section');
            authSection.innerHTML = `
                <a href="/login" class="bg-white text-green-700 px-4 py-2 rounded font-medium hover:bg-gray-100">Login</a>
                <a href="/register" class="bg-green-500 px-4 py-2 rounded font-medium hover:bg-green-600">Register</a>
            `;
        }
        
        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/';
        }
    </script>
</body>
</html>
