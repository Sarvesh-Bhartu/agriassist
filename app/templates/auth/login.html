{% extends "base.html" %}

{% block title %}Login - Agricultural Assistant{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12">
    <div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-6 text-center">Login</h1>

        <form id="login-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Phone Number</label>
                <input type="tel" id="phone" placeholder="9876543210"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" required />
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" id="password"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" required />
            </div>

            <button type="submit"
                class="w-full bg-green-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-green-700">
                Login
            </button>
        </form>

        <p class="mt-6 text-center text-gray-600">
            Don't have an account?
            <a href="/register" class="text-green-600 font-medium hover:underline">Register here</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const phone = document.getElementById('phone').value;
        const password = document.getElementById('password').value;

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ phone, password })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Login failed');
            }

            const data = await response.json();
            localStorage.setItem('token', data.access_token);

            showToast('Login successful!', 'success');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1000);

        } catch (error) {
            showToast(error.message, 'error');
        }
    });
</script>
{% endblock %}
