{% extends "base.html" %}

{% block title %}Register - Agricultural Assistant{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12">
    <div class="max-w-lg mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-6 text-center">Create Account</h1>

        <form id="register-form" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Full Name *</label>
                <input type="text" id="name" placeholder="Ramesh Kumar"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" required />
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Phone Number *</label>
                <input type="tel" id="phone" placeholder="9876543210"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" required />
                <p class="text-sm text-gray-500 mt-1">10-digit Indian mobile number</p>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Email (Optional)</label>
                <input type="email" id="email" placeholder="farmer@example.com"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" />
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Password *</label>
                <input type="password" id="password" placeholder="Minimum 6 characters"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" required
                    minlength="6" />
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-2">District</label>
                    <input type="text" id="district" placeholder="Pune"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" />
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">State</label>
                    <input type="text" id="state" placeholder="Maharashtra"
                        class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-green-500" />
                </div>
            </div>

            <button type="submit"
                class="w-full bg-green-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-green-700">
                Create Account
            </button>
        </form>

        <p class="mt-6 text-center text-gray-600">
            Already have an account?
            <a href="/login" class="text-green-600 font-medium hover:underline">Login here</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value || null,
            password: document.getElementById('password').value,
            district: document.getElementById('district').value || null,
            state: document.getElementById('state').value || null
        };

        try {
            const response = await fetch('/api/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.detail || 'Registration failed');
            }

            const data = await response.json();
            localStorage.setItem('token', data.access_token);

            showToast('Registration successful! Welcome to AgriAssist!', 'success');
            setTimeout(() => {
                window.location.href = '/dashboard';
            }, 1500);

        } catch (error) {
            showToast(error.message, 'error');
        }
    });
</script>
{% endblock %}
